<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>製程異常分析查詢</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="mark">YS</div>
        <div>
          <h1>製程異常分析</h1>
          <p>Database / MES 代碼查詢</p>
        </div>
      </div>
      <div class="sidebar-stat">
        <span>資料筆數</span>
        <strong id="totalRecords">0</strong>
      </div>
      <div class="sidebar-stat">
        <span>MES 原因</span>
        <strong id="totalReasons">0</strong>
      </div>
      <div class="hint">選定日期、班別、等級與降規原因後，右側會列出所有對應異常分析。</div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h2>異常分析查詢</h2>
          <p id="metaText">資料載入中</p>
        </div>
        <button id="resetAll" type="button" class="ghost">清除條件</button>
      </header>

      <section class="filters" aria-label="查詢條件">
        <div class="filter-group">
          <label>線別</label>
          <div id="lineButtons" class="segmented"></div>
        </div>
        <div class="filter-group">
          <label>日期</label>
          <input id="dateFilter" type="date">
        </div>
        <div class="filter-group">
          <label>班別</label>
          <div id="shiftButtons" class="segmented"></div>
        </div>
        <div class="filter-group">
          <label>模組等級</label>
          <div id="gradeButtons" class="segmented"></div>
        </div>
        <div class="filter-group wide">
          <label>降規原因</label>
          <select id="reasonFilter"></select>
        </div>
        <div class="filter-group wide">
          <label>異常分析</label>
          <input id="analysisFilter" type="search" placeholder="輸入分析關鍵字、模組序號、root cause">
        </div>
        <div class="actions">
          <button id="searchButton" class="primary" type="button">查詢</button>
        </div>
      </section>

      <section class="summary">
        <div><span>符合筆數</span><strong id="matchedCount">0</strong></div>
        <div><span>目前日期</span><strong id="currentDate">全部</strong></div>
        <div><span>目前原因</span><strong id="currentReason">全部</strong></div>
      </section>

      <section class="results-panel">
        <div class="panel-head">
          <h3>查詢結果</h3>
          <span id="resultNote">請選擇條件後查詢</span>
        </div>
        <div id="results" class="results empty">尚未查詢</div>
        <div id="pagination" class="pagination" aria-label="查詢結果分頁"></div>
      </section>
    </main>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
