<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>製程異常分析查詢</title><link rel="stylesheet" href="style.css"></head><body><header><div class="wrap"><h1>製程異常分析查詢</h1><p>選擇線別、日期、班別、模組等級與降規原因後，查詢對應異常分析。</p></div></header><main class="wrap"><section class="panel"><div class="grid"><div><label>線別</label><select id="line"><option value="">全部</option><option>L4</option><option>L5</option></select></div><div><label>日期</label><input id="date" type="date"></div><div><label>班別</label><select id="shift"><option value="">全部</option><option>DA</option><option>NA</option><option>DB</option><option>NB</option></select></div><div><label>模組等級</label><select id="grade"><option value="">全部</option><option>A規</option><option>B規</option><option>C規</option><option>F規</option><option>M規</option></select></div><div><label>降規原因</label><select id="reason"><option value="">請選擇 MES 異常代碼</option></select></div><div><label>異常分析關鍵字</label><input id="keyword" placeholder="可輸入分析、現象、root cause"></div></div><div class="btns"><button class="primary" onclick="searchData()">查詢異常分析</button><button class="ghost" onclick="resetForm()">清除條件</button></div></section><section class="panel summary"><div class="kpi"><span>資料筆數</span><b id="total">0</b></div><div class="kpi"><span>符合筆數</span><b id="matched">0</b></div><div class="kpi"><span>MES原因數</span><b id="reasonCount">0</b></div><div class="kpi"><span>目前原因</span><b id="currentReason">未選擇</b></div></section><section class="panel"><h2>查詢結果</h2><div id="results" class="empty">請選擇條件後按「查詢異常分析」。</div></section></main><script src="data.js"></script><script src="app.js"></script></body></html>
